<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CalcScript — Math-First Programming Language</title>
  <meta name="description" content="A browser-based IDE for CalcScript, a custom math-first programming language." />

  <!-- Tailwind CSS (Play CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwindcss.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
          },
          colors: {
            surface: {
              900: '#0a0c10',
              800: '#0f1117',
              700: '#161921',
              600: '#1e222d',
              500: '#262b38',
            },
            accent: {
              DEFAULT: '#6c5ce7',
              light:   '#a29bfe',
              glow:    'rgba(108, 92, 231, 0.25)',
            },
            mint: '#00cec9',
            coral: '#ff7675',
          },
        },
      },
    };
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Vue 3 (global build) -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

  <style>
    /* ── Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      background: #0a0c10;
      color: #e2e8f0;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── Scrollbar ────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333a4a; border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: #4a5268; }

    /* ── Textarea styling ─────────────────────────────────── */
    #code-editor {
      resize: none;
      background: transparent;
      color: #e2e8f0;
      caret-color: #a29bfe;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.9rem;
      line-height: 1.75;
      tab-size: 4;
      outline: none;
      width: 100%;
      height: 100%;
      padding: 1.25rem;
    }
    #code-editor::placeholder { color: #4a5268; }

    /* ── Glow effects ─────────────────────────────────────── */
    .glow-border {
      position: relative;
    }
    .glow-border::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, #6c5ce7 0%, #00cec9 50%, #6c5ce7 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.4;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .glow-border:focus-within::before { opacity: 0.85; }

    /* ── Button pulse ─────────────────────────────────────── */
    .btn-run {
      position: relative;
      overflow: hidden;
      transition: all 0.25s ease;
    }
    .btn-run::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.08) 50%, transparent 60%);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }
    .btn-run:hover::after { transform: translateX(100%); }
    .btn-run:active { transform: scale(0.97); }

    /* ── Console blink cursor ─────────────────────────────── */
    .console-cursor::after {
      content: '▋';
      animation: blink 1s step-end infinite;
      color: #00cec9;
      font-size: 0.85rem;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0; }
    }

    /* ── Fade-in animation ────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-up {
      animation: fadeUp 0.5s ease both;
    }
    .delay-100 { animation-delay: 0.1s; }
    .delay-200 { animation-delay: 0.2s; }
    .delay-300 { animation-delay: 0.3s; }

    /* ── Spinner ──────────────────────────────────────────── */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Status dot pulse ─────────────────────────────────── */
    @keyframes dotPulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.4; }
    }
    .dot-pulse { animation: dotPulse 2s ease-in-out infinite; }
  </style>
</head>

<body>
  <div id="app">

    <!-- ── Background gradient blobs ──────────────────────── -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden -z-10">
      <div class="absolute -top-40 -left-40 w-[500px] h-[500px] bg-accent/[0.07] rounded-full blur-[120px]"></div>
      <div class="absolute -bottom-60 -right-40 w-[600px] h-[600px] bg-mint/[0.05] rounded-full blur-[140px]"></div>
    </div>

    <!-- ── Header ─────────────────────────────────────────── -->
    <header class="animate-fade-up px-6 pt-8 pb-4 max-w-5xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <!-- Logo mark -->
        <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-accent to-mint flex items-center justify-center shadow-lg shadow-accent/20">
          <span class="text-white font-extrabold text-sm font-mono">Cs</span>
        </div>
        <div>
          <h1 class="text-lg font-bold tracking-tight text-white leading-none">CalcScript</h1>
          <p class="text-[11px] text-slate-500 font-medium tracking-wide uppercase mt-0.5">Math-First Language</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <span class="dot-pulse inline-block w-2 h-2 rounded-full" :class="status === 'error' ? 'bg-coral' : 'bg-emerald-400'"></span>
        <span class="text-xs text-slate-500 font-mono">v0.1.0</span>
      </div>
    </header>

    <!-- ── Main content ───────────────────────────────────── -->
    <main class="px-6 pb-10 max-w-5xl mx-auto grid gap-5 lg:grid-cols-2">

      <!-- ── Editor panel ────────────────────────────────── -->
      <section class="animate-fade-up delay-100 flex flex-col">
        <div class="flex items-center justify-between mb-2.5">
          <label for="code-editor" class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Editor</label>
          <span class="text-[11px] text-slate-600 font-mono">{{ lineCount }} lines</span>
        </div>
        <div class="glow-border flex-1 rounded-xl bg-surface-700/80 backdrop-blur-sm min-h-[370px] flex flex-col">
          <!-- Tab bar -->
          <div class="flex items-center gap-1.5 px-4 pt-3 pb-0">
            <span class="w-3 h-3 rounded-full bg-coral/60"></span>
            <span class="w-3 h-3 rounded-full bg-yellow-500/60"></span>
            <span class="w-3 h-3 rounded-full bg-emerald-400/60"></span>
            <span class="ml-3 text-[11px] text-slate-500 font-mono">main.cs</span>
          </div>
          <textarea
            id="code-editor"
            v-model="code"
            spellcheck="false"
            autocomplete="off"
            autocapitalize="off"
            placeholder="Write your CalcScript here..."
            @keydown.ctrl.enter.prevent="runCode"
          ></textarea>
        </div>

        <!-- ── Run button ──────────────────────────────────── -->
        <button
          id="run-button"
          class="btn-run mt-4 w-full py-3 rounded-xl font-semibold text-sm tracking-wide text-white
                 bg-gradient-to-r from-accent to-[#5a4bd1]
                 hover:shadow-lg hover:shadow-accent/30
                 disabled:opacity-50 disabled:cursor-not-allowed
                 flex items-center justify-center gap-2"
          :disabled="running"
          @click="runCode"
        >
          <div v-if="running" class="spinner"></div>
          <span v-if="running">Executing…</span>
          <span v-else>▶&ensp;Run Code</span>
        </button>
        <p class="text-center text-[11px] text-slate-600 mt-1.5 font-mono">Ctrl + Enter</p>
      </section>

      <!-- ── Output panel ────────────────────────────────── -->
      <section class="animate-fade-up delay-200 flex flex-col">
        <div class="flex items-center justify-between mb-2.5">
          <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Console Output</label>
          <button
            id="clear-button"
            class="text-[11px] text-slate-600 hover:text-slate-400 transition-colors font-mono"
            @click="clearOutput"
          >clear</button>
        </div>
        <div class="glow-border flex-1 rounded-xl bg-surface-900/90 backdrop-blur-sm min-h-[370px] flex flex-col">
          <!-- Tab bar -->
          <div class="flex items-center gap-1.5 px-4 pt-3 pb-2 border-b border-white/[0.04]">
            <span class="w-3 h-3 rounded-full bg-coral/60"></span>
            <span class="w-3 h-3 rounded-full bg-yellow-500/60"></span>
            <span class="w-3 h-3 rounded-full bg-emerald-400/60"></span>
            <span class="ml-3 text-[11px] text-slate-500 font-mono">output</span>
          </div>
          <pre
            id="output-console"
            class="flex-1 px-5 py-4 font-mono text-sm leading-relaxed overflow-auto whitespace-pre-wrap"
            :class="status === 'error' ? 'text-coral' : 'text-emerald-300'"
          ><span v-if="output">{{ output }}</span><span v-else class="text-slate-600 italic">Run your code to see output here…</span><span v-if="!running && output" class="console-cursor"></span></pre>
        </div>
      </section>
    </main>

    <!-- ── Footer ──────────────────────────────────────────── -->
    <footer class="animate-fade-up delay-300 text-center pb-6">
      <p class="text-[11px] text-slate-600 font-mono">
        CalcScript Compiler &middot; Lexer → Parser → Evaluator &middot; Flask + Vue 3
      </p>
    </footer>

  </div>

  <!-- ── Vue App ──────────────────────────────────────────── -->
  <script>
    const { createApp, ref, computed } = Vue;

    createApp({
      setup() {
        const code = ref(`# Define variables\nlet x = 10\nlet y = 5\n\n# Calculate and print result\nprint x * (y + 2)`);
        const output = ref('');
        const running = ref(false);
        const status = ref('idle'); // 'idle' | 'success' | 'error'

        const lineCount = computed(() => code.value.split('\n').length);

        async function runCode() {
          if (running.value) return;

          running.value = true;
          output.value = '';
          status.value = 'idle';

          try {
            const res = await fetch('http://localhost:5000/api/run', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ code: code.value }),
            });

            const data = await res.json();

            if (data.success) {
              output.value = data.output || '(no output)';
              status.value = 'success';
            } else {
              output.value = `Error: ${data.error}`;
              status.value = 'error';
            }
          } catch (err) {
            output.value = `Connection failed: ${err.message}\n\nMake sure the backend is running:\n  cd backend && python app.py`;
            status.value = 'error';
          } finally {
            running.value = false;
          }
        }

        function clearOutput() {
          output.value = '';
          status.value = 'idle';
        }

        return { code, output, running, status, lineCount, runCode, clearOutput };
      },
    }).mount('#app');
  </script>
</body>
</html>
